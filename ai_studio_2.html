<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresAI - Presupuesto de Obra</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- Constantes ---
        const ALL_CATEGORIES = [
            'Personal supervisión', 'Personal técnico', 'Maquinaria y equipos', 
            'Elementos de seguridad', 'Consumos de obra', 'Herramientas menores', 
            'Gastos zonales', 'Gastos de oficina central', 'Gastos financiero', 'Otros'
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('gg'); // Iniciamos en GG para ver los cambios
            const [activeCategories, setActiveCategories] = useState(['Otros']);
            const [ggItems, setGgItems] = useState([]);
            const [showDropdown, setShowDropdown] = useState(false);

            // --- Lógica de Gastos Generales ---
            const addCategory = (cat) => {
                if (!activeCategories.includes(cat)) {
                    setActiveCategories([...activeCategories, cat]);
                }
                setShowDropdown(false);
            };

            const removeCategory = (cat) => {
                if (confirm(`¿Eliminar la sección "${cat}"?`)) {
                    setActiveCategories(activeCategories.filter(c => c !== cat));
                    setGgItems(ggItems.filter(it => it.category !== cat));
                }
            };

            const addItem = (cat) => {
                const newItem = {
                    id: Date.now(),
                    category: cat,
                    desc: '',
                    unit: 'mes',
                    qty: 1,
                    tiempoUso: 1,
                    price: 0
                };
                setGgItems([...ggItems, newItem]);
            };

            const updateItem = (id, field, value) => {
                setGgItems(ggItems.map(it => it.id === id ? { ...it, [field]: value } : it));
            };

            const deleteItem = (id) => {
                setGgItems(ggItems.filter(it => it.id !== id));
            };

            // --- Cálculos ---
            const fmt = (n) => n.toLocaleString('es-CL');
            const totalGG = ggItems.reduce((acc, it) => acc + (it.qty * it.tiempoUso * it.price), 0);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-[#1e3a5f] text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-white/10 p-2 rounded-lg border border-white/20">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">Pres<span className="text-blue-300">AI</span></h1>
                        </div>
                        <div className="flex gap-2">
                            <button className="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-md text-sm font-bold transition-all">Imprimir Informe</button>
                        </div>
                    </header>

                    {/* Tabs */}
                    <nav className="bg-white border-b border-slate-200 flex px-4">
                        <button onClick={() => setActiveTab('bud')} className={`px-6 py-4 text-xs font-bold uppercase border-b-2 transition-all ${activeTab === 'bud' ? 'border-[#1e3a5f] text-[#1e3a5f]' : 'border-transparent text-slate-400'}`}>Presupuesto</button>
                        <button onClick={() => setActiveTab('gg')} className={`px-6 py-4 text-xs font-bold uppercase border-b-2 transition-all ${activeTab === 'gg' ? 'border-[#1e3a5f] text-[#1e3a5f]' : 'border-transparent text-slate-400'}`}>Gastos Generales</button>
                    </nav>

                    {/* Content */}
                    <main className="p-6 max-w-7xl mx-auto w-full flex-1 pb-32">
                        {activeTab === 'gg' && (
                            <div className="space-y-8">
                                {activeCategories.map(cat => {
                                    const items = ggItems.filter(it => it.category === cat);
                                    const subtotal = items.reduce((acc, it) => acc + (it.qty * it.tiempoUso * it.price), 0);

                                    return (
                                        <div key={cat} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                                <h2 className="font-bold text-[#1e3a5f] uppercase text-sm tracking-wider">{cat}</h2>
                                                <button onClick={() => removeCategory(cat)} className="text-red-400 hover:text-red-600 text-xs font-bold">Eliminar Sección ×</button>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm">
                                                    <thead className="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-bold border-b border-slate-100">
                                                        <tr>
                                                            <th className="p-3 text-left">Descripción</th>
                                                            <th className="p-3 text-center w-20">Unid</th>
                                                            <th className="p-3 text-right w-24">Cant.</th>
                                                            <th className="p-3 text-right w-24 bg-blue-50 text-blue-600">Tiempo Uso</th>
                                                            <th className="p-3 text-right w-32">Precio</th>
                                                            <th className="p-3 text-right w-32">Subtotal</th>
                                                            <th className="p-3 w-10"></th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-50">
                                                        {items.map(it => (
                                                            <tr key={it.id} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="p-2"><input className="w-full bg-transparent outline-none p-1" value={it.desc} onChange={e => updateItem(it.id, 'desc', e.target.value)} placeholder="Ej: Jefe de Terreno" /></td>
                                                                <td className="p-2"><input className="w-full bg-transparent outline-none p-1 text-center" value={it.unit} onChange={e => updateItem(it.id, 'unit', e.target.value)} /></td>
                                                                <td className="p-2"><input type="number" className="w-full bg-transparent outline-none p-1 text-right font-mono" value={it.qty} onChange={e => updateItem(it.id, 'qty', Number(e.target.value))} /></td>
                                                                <td className="p-2 bg-blue-50/20"><input type="number" className="w-full bg-transparent outline-none p-1 text-right font-mono text-blue-600 font-bold" value={it.tiempoUso} onChange={e => updateItem(it.id, 'tiempoUso', Number(e.target.value))} /></td>
                                                                <td className="p-2"><input type="number" className="w-full bg-transparent outline-none p-1 text-right font-mono" value={it.price} onChange={e => updateItem(it.id, 'price', Number(e.target.value))} /></td>
                                                                <td className="p-2 text-right font-mono font-bold text-slate-600">$ {fmt(it.qty * it.tiempoUso * it.price)}</td>
                                                                <td className="p-2 text-center"><button onClick={() => deleteItem(it.id)} className="text-slate-300 hover:text-red-500">×</button></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                            <div className="p-3 bg-slate-50/50 border-t border-slate-100 flex justify-between items-center">
                                                <button onClick={() => addItem(cat)} className="text-blue-600 font-bold text-[10px] uppercase tracking-widest hover:underline">+ Agregar Gasto</button>
                                                <div className="text-sm">
                                                    <span className="text-slate-400 mr-2">Subtotal {cat}:</span>
                                                    <span className="font-bold text-[#1e3a5f]">$ {fmt(subtotal)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}

                                {/* Botón Desplegable Dinámico */}
                                <div className="flex justify-center pt-8 relative">
                                    <button 
                                        onClick={() => setShowDropdown(!showDropdown)}
                                        className="bg-[#1e3a5f] text-white px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest shadow-xl hover:scale-105 transition-all flex items-center gap-2"
                                    >
                                        Agregar Campo {showDropdown ? '▲' : '▼'}
                                    </button>

                                    {showDropdown && (
                                        <div className="absolute bottom-full mb-4 w-64 bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden z-50">
                                            <div className="p-3 bg-slate-50 text-[10px] font-bold text-slate-400 uppercase border-b">Categorías Disponibles</div>
                                            <div className="max-h-60 overflow-y-auto">
                                                {ALL_CATEGORIES.filter(c => !activeCategories.includes(c)).map(c => (
                                                    <button key={c} onClick={() => addCategory(c)} className="w-full text-left px-4 py-3 text-xs hover:bg-blue-50 hover:text-blue-600 transition-colors border-b border-slate-50 last:border-none">
                                                        {c}
                                                    </button>
                                                ))}
                                                {ALL_CATEGORIES.filter(c => !activeCategories.includes(c)).length === 0 && (
                                                    <div className="p-4 text-center text-[10px] text-slate-400 italic">No hay más campos</div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Fijo con Total */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-2xl flex justify-end items-center px-8">
                        <div className="flex items-center gap-4">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Gastos Generales:</span>
                            <span className="text-2xl font-black text-[#1e3a5f]">$ {fmt(totalGG)}</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
