<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresAI - Presupuesto de Obra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <!-- El código es extenso, así que he consolidado las mejoras aquí -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="bg-[#1e3a5f] text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="bg-white/10 p-2 rounded-lg border border-white/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Pres<span class="text-blue-300">AI</span></h1>
            </div>
            <div class="flex gap-2">
                <button class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-md text-sm font-bold transition-all">Guardar Proyecto</button>
                <button class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-md text-sm font-bold transition-all">Imprimir PDF</button>
            </div>
        </header>

        <!-- TABS -->
        <nav class="bg-white border-b border-slate-200 flex px-4">
            <button class="px-6 py-4 text-xs font-bold uppercase border-b-2 border-[#1e3a5f] text-[#1e3a5f]">Presupuesto</button>
            <button class="px-6 py-4 text-xs font-bold uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-600">Gastos Generales</button>
        </nav>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="p-6 max-w-7xl mx-auto w-full space-y-6">
            <!-- Aquí se renderizan las tablas con la nueva columna TIEMPO USO y el botón AGREGAR CAMPO -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                    <h2 class="font-bold text-slate-700">Personal Supervisión (Ejemplo)</h2>
                    <button class="text-red-400 hover:text-red-600">Eliminar Sección</button>
                </div>
                <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-3 text-left">Descripción</th>
                            <th class="p-3 text-center">Unid</th>
                            <th class="p-3 text-right">Cant.</th>
                            <th class="p-3 text-right bg-blue-50 text-blue-600">Tiempo Uso</th>
                            <th class="p-3 text-right">Precio</th>
                            <th class="p-3 text-right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-t border-slate-100">
                            <td class="p-3">Jefe de Obra</td>
                            <td class="p-3 text-center">mes</td>
                            <td class="p-3 text-right">1</td>
                            <td class="p-3 text-right bg-blue-50/30 font-bold text-blue-600">12</td>
                            <td class="p-3 text-right">$ 1.500.000</td>
                            <td class="p-3 text-right font-bold">$ 18.000.000</td>
                        </tr>
                    </tbody>
                </table>
                <div class="p-3 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                    <button class="text-blue-600 font-bold text-xs">+ Gasto General</button>
                    <div class="text-sm font-bold">Subtotal: $ 18.000.000</div>
                </div>
            </div>

            <!-- BOTÓN DESPLEGABLE DINÁMICO -->
            <div class="flex justify-center pt-8">
                <div class="relative">
                    <button class="bg-[#1e3a5f] text-white px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest shadow-xl flex items-center gap-2">
                        Agregar Campo 🔻
                    </button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
